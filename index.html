<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>🕹️ Paris Invaders</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--panel:#0f0f1a;--border:#1a1a2e;--ok:#00ff88;--damaged:#ffaa00;--destroyed:#ff3355;--hidden:#8888ff;--text:#c8c8e8;--accent:#00ffcc}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;transition:opacity .4s}
#splash-title{font-family:'Orbitron',monospace;font-weight:900;font-size:28px;color:var(--accent);text-shadow:0 0 30px rgba(0,255,204,.6);letter-spacing:4px;animation:pulse 2s infinite}
#splash-title s{color:#ff3355;text-decoration:none}
@keyframes pulse{0%,100%{text-shadow:0 0 20px rgba(0,255,204,.4)}50%{text-shadow:0 0 50px rgba(0,255,204,.9)}}
#splash-bar-bg{width:280px;height:2px;background:#1a1a2e;border-radius:1px;overflow:hidden}
#splash-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--ok),var(--accent));transition:width .3s ease}
#splash-msg{font-size:11px;color:#444;letter-spacing:2px}
#splash-msg::after{content:'_';animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* HEADER */
#hd{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;z-index:1000;flex-shrink:0}
#tt{font-family:'Orbitron',monospace;font-weight:900;font-size:12px;color:var(--accent);letter-spacing:2px;white-space:nowrap}
#tt s{color:#ff3355;text-decoration:none}
#st{display:flex;gap:4px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:3px;font-size:10px;padding:2px 5px;border-radius:3px;border:1px solid;cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap}
.stat.off{opacity:.2}
.ok{color:var(--ok);border-color:var(--ok)}.ok.on{background:rgba(0,255,136,.1)}
.dm{color:var(--damaged);border-color:var(--damaged)}.dm.on{background:rgba(255,170,0,.1)}
.ds{color:var(--destroyed);border-color:var(--destroyed)}.ds.on{background:rgba(255,51,85,.1)}
.hd{color:var(--hidden);border-color:var(--hidden)}.hd.on{background:rgba(136,136,255,.1)}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ok .dot{background:var(--ok)}.dm .dot{background:var(--damaged)}.ds .dot{background:var(--destroyed)}.hd .dot{background:var(--hidden)}
#rg{display:flex;align-items:center;gap:5px;margin-left:auto}
#sr{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:3px 7px;border-radius:3px;width:80px;outline:none}
#sr:focus{border-color:var(--accent)}#sr::placeholder{color:#333}
#vc{font-size:10px;color:#555;white-space:nowrap}#vc b{color:var(--accent);font-weight:normal}
.hbtn{background:transparent;border:1px solid #252535;color:#555;font-size:13px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:3px;transition:all .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.hbtn.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(0,255,204,.3)}
/* MAP */
#map{flex:1;background:#050510;position:relative}
/* FOOTER */
#ft{background:var(--panel);border-top:1px solid var(--border);padding:4px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;font-size:10px;color:#555;flex-wrap:wrap}
#ft b{color:var(--accent);font-weight:normal}
.fb{background:transparent;border:1px solid #252535;color:#555;font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 6px;cursor:pointer;border-radius:2px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.fb:hover,.fb:active{border-color:var(--accent);color:var(--accent)}
#gps-info{margin-left:auto;color:#333;font-size:10px;white-space:nowrap}
/* ALERTE PROXIMITE */
#alert{position:fixed;top:0;left:0;right:0;z-index:9998;background:linear-gradient(135deg,#060e06,#0a1a0a);border-bottom:2px solid var(--ok);padding:8px 12px;display:none;align-items:center;gap:8px;animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
#alert-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--ok);display:flex;align-items:center;gap:5px;white-space:nowrap}
.blink{animation:blink 0.7s infinite}
#alert-info{font-size:11px;color:#aaa;flex:1}
#alert-nav{background:transparent;border:1px solid var(--ok);color:var(--ok);font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 7px;cursor:pointer;border-radius:2px;white-space:nowrap}
#alert-close{background:transparent;border:1px solid #1a3a1a;color:#555;font-size:10px;padding:2px 7px;cursor:pointer;border-radius:2px;font-family:'Share Tech Mono',monospace;white-space:nowrap}
/* PANEL RADAR */
#radar{position:fixed;bottom:44px;left:0;right:0;z-index:9000;background:var(--panel);border-top:1px solid var(--border);padding:8px 10px;display:none;flex-direction:column;gap:6px;max-height:55vh;overflow:hidden}
#radar-hd{display:flex;align-items:center;gap:8px}
#radar-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent)}
#radar-radius{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:10px;color:#555}
#radius-val{color:var(--accent)}
#radar-list{overflow-y:auto;display:flex;flex-direction:column;gap:4px;max-height:calc(55vh - 40px)}
.radar-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid #1a1a2e;border-radius:3px;cursor:pointer;transition:all .15s}
.radar-item:hover,.radar-item:active{border-color:var(--accent)}
.radar-item.fl{opacity:.4}
.ri-id{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);width:70px;flex-shrink:0}
.ri-dist{font-size:11px;color:#777;width:42px;flex-shrink:0}
.ri-status{font-size:9px;padding:1px 5px;border-radius:2px;flex-shrink:0}
.ri-hint{font-size:9px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-nav{background:transparent;border:1px solid #252535;color:#555;font-size:10px;padding:1px 6px;cursor:pointer;border-radius:2px;flex-shrink:0;font-family:'Share Tech Mono',monospace}
.ri-nav:hover{border-color:var(--accent);color:var(--accent)}
/* PANEL STATS */
#stats-panel{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9990;background:var(--bg);overflow-y:auto;display:none;flex-direction:column}
#stats-hd{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:1}
#stats-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent)}
#stats-close{margin-left:auto;background:transparent;border:1px solid #252535;color:#555;font-size:12px;padding:3px 10px;cursor:pointer;border-radius:3px;font-family:'Share Tech Mono',monospace}
#stats-close:hover{border-color:var(--accent);color:var(--accent)}
#stats-body{padding:12px}
.stats-global{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sg-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:10px;text-align:center}
.sg-val{font-family:'Orbitron',monospace;font-size:22px;color:var(--accent);font-weight:900}
.sg-lbl{font-size:9px;color:#555;letter-spacing:1px;margin-top:3px}
.sg-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.sg-bar-fill{height:100%;background:linear-gradient(90deg,var(--ok),var(--accent));transition:width .5s ease}
#arr-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.arr-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:8px;cursor:pointer;transition:all .2s}
.arr-card:hover{border-color:var(--accent)}
.arr-num{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);margin-bottom:4px}
.arr-prog{font-size:10px;color:#777;margin-bottom:5px}
.arr-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.arr-bar-fill{height:100%;background:linear-gradient(90deg,var(--ok),var(--accent));transition:width .5s ease}
.arr-counts{display:flex;gap:4px;margin-top:5px;font-size:9px}
/* PANEL ITINERAIRE */
#rando-panel{position:fixed;bottom:44px;right:8px;z-index:9001;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:10px;display:none;width:240px;max-height:60vh;overflow-y:auto}
#rando-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);margin-bottom:8px}
#rando-config{display:flex;flex-direction:column;gap:6px;font-size:10px;color:#777}
#rando-config label{display:flex;align-items:center;justify-content:space-between;gap:8px}
#rando-config input[type=range]{flex:1;accent-color:var(--accent)}
#rando-config span{color:var(--accent);width:35px;text-align:right}
#rando-start{width:100%;margin-top:8px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;padding:5px;cursor:pointer;border-radius:3px;transition:all .2s}
#rando-start:hover{background:rgba(0,255,204,.1)}
#rando-route{margin-top:8px;display:none}
.rando-stop{font-size:10px;color:#aaa;padding:3px 0;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;gap:6px}
.rando-stop-num{color:var(--accent);font-family:'Orbitron',monospace;font-size:9px;width:16px;flex-shrink:0}
.rando-stop-id{color:var(--accent);width:60px;flex-shrink:0;font-family:'Orbitron',monospace;font-size:9px}
.rando-stop-d{color:#555;width:35px;flex-shrink:0}
.rando-stop-nav{background:transparent;border:1px solid #252535;color:#555;font-size:9px;padding:1px 4px;cursor:pointer;border-radius:2px;font-family:'Share Tech Mono',monospace;margin-left:auto}
.rando-stop-nav:hover{border-color:var(--accent);color:var(--accent)}
/* SLIDER RAYON */
input[type=range]{-webkit-appearance:none;appearance:none;height:2px;background:var(--border);border-radius:1px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
/* LEAFLET */
.leaflet-container{background:#080810!important}
.leaflet-tile{filter:grayscale(100%) brightness(.35) sepia(.4) hue-rotate(200deg)}
.leaflet-popup-content-wrapper{background:var(--panel);border:1px solid #252535;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.9)}
.leaflet-popup-tip{background:var(--panel)}
.leaflet-popup-close-button{color:#444!important}
.leaflet-popup-content{color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;margin:10px 14px;min-width:158px}
.pi{font-family:'Orbitron',monospace;font-weight:900;font-size:14px;color:var(--accent);margin-bottom:4px}
.ps{padding:2px 7px;border-radius:2px;font-size:10px;display:inline-block}
.ps.OK{background:rgba(0,255,136,.1);color:var(--ok);border:1px solid var(--ok)}
.ps.damaged{background:rgba(255,170,0,.1);color:var(--damaged);border:1px solid var(--damaged)}
.ps.destroyed{background:rgba(255,51,85,.1);color:var(--destroyed);border:1px solid var(--destroyed)}
.ps.hidden{background:rgba(136,136,255,.1);color:var(--hidden);border:1px solid var(--hidden)}
.ph{color:#666;font-size:10px;margin-top:5px;font-style:italic;line-height:1.4}
.pa{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap}
.pb{flex:1;background:transparent;border:1px solid #252535;color:#666;font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px;cursor:pointer;border-radius:2px;text-align:center;text-decoration:none;display:block;transition:all .15s;white-space:nowrap}
.pb:hover,.pb:active{border-color:var(--accent);color:var(--accent)}
.pf{border-color:var(--ok)!important;color:var(--ok)!important}
.pf.fl{background:rgba(0,255,136,.1)!important}
.pnav{border-color:var(--accent)!important;color:var(--accent)!important}
.my-dot{width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid rgba(255,255,255,.9);box-shadow:0 0 0 4px rgba(0,255,204,.25),0 0 12px rgba(0,255,204,.4)}
.route-line{stroke:rgba(0,255,204,.5);stroke-width:2;stroke-dasharray:6,4;fill:none}
</style>
</head>
<body>

<div id="splash">
  <div id="splash-title">🕹 PARIS<s>INVADERS</s></div>
  <div id="splash-bar-bg"><div id="splash-bar"></div></div>
  <div id="splash-msg">CHARGEMENT</div>
</div>

<div id="alert">
  <div id="alert-title"><span class="blink">⚡</span>&nbsp;PROCHE !</div>
  <span id="alert-info"></span>
  <button id="alert-nav" onclick="navClosest()">🗺 Y ALLER</button>
  <button id="alert-close" onclick="closeAlert()">✕</button>
</div>

<div id="hd">
  <div id="tt">🕹 PARIS<s>INVADERS</s></div>
  <div id="st">
    <div class="stat ok on" onclick="tf('OK')"><div class="dot"></div><span id="co">0</span> OK</div>
    <div class="stat dm on" onclick="tf('damaged')"><div class="dot"></div><span id="cd">0</span> DMG</div>
    <div class="stat ds on" onclick="tf('destroyed')"><div class="dot"></div><span id="cx">0</span> DEST</div>
    <div class="stat hd on" onclick="tf('hidden')"><div class="dot"></div><span id="ch">0</span> HID</div>
  </div>
  <div id="rg">
    <input id="sr" placeholder="PA_XXX…" oninput="si(this.value)"/>
    <div id="vc">VIS:<b id="vn">0</b></div>
    <button class="hbtn" id="radar-btn" onclick="toggleRadar()" title="Radar proximité">📡</button>
    <button class="hbtn" id="rando-btn" onclick="toggleRando()" title="Itinéraire optimisé">🗺</button>
    <button class="hbtn" onclick="showStats()" title="Stats arrondissements">📊</button>
    <button class="hbtn" id="gps-btn" onclick="toggleGps()" title="Géolocalisation">📍</button>
  </div>
</div>

<div id="map"></div>

<div id="ft">
  FLASHÉ:<b id="fn">0</b>/1555
  <button class="fb" onclick="ef()">⬇ EXP</button>
  <button class="fb" onclick="ifn()">⬆ IMP</button>
  <button class="fb" onclick="cf()">✕ RST</button>
  <span id="gps-info">GPS OFF</span>
</div>

<!-- RADAR PANEL -->
<div id="radar">
  <div id="radar-hd">
    <div id="radar-title">⚡ RADAR</div>
    <div id="radar-radius">
      RAYON: <span id="radius-val">150</span>m
      <input type="range" id="radius-slider" min="50" max="500" step="50" value="150" oninput="updateRadius(this.value)">
    </div>
    <button class="fb" style="margin-left:8px" onclick="toggleRadar()">✕</button>
  </div>
  <div id="radar-list"></div>
</div>

<!-- RANDO PANEL -->
<div id="rando-panel">
  <div id="rando-title">🗺 RANDO OPTIMISÉE</div>
  <div id="rando-config">
    <label>Nb invaders: <input type="range" id="rando-n" min="3" max="20" step="1" value="8" oninput="document.getElementById('rando-n-val').textContent=this.value"><span id="rando-n-val">8</span></label>
    <label>Rayon max: <input type="range" id="rando-r" min="200" max="2000" step="100" value="800" oninput="document.getElementById('rando-r-val').textContent=this.value+'m'"><span id="rando-r-val">800m</span></label>
  </div>
  <button id="rando-start" onclick="calcRando()">⚡ CALCULER ITINÉRAIRE</button>
  <div id="rando-route"></div>
</div>

<!-- STATS PANEL -->
<div id="stats-panel">
  <div id="stats-hd">
    <div id="stats-title">📊 STATS PAR ARRONDISSEMENT</div>
    <button id="stats-close" onclick="hideStats()">✕ FERMER</button>
  </div>
  <div id="stats-body">
    <div class="stats-global" id="stats-global"></div>
    <div id="arr-grid"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script>
const C={OK:'#00ff88',damaged:'#ffaa00',destroyed:'#ff3355',hidden:'#8888ff'};
let PROX=150;
let D=[],af=new Set(['OK','damaged','destroyed','hidden']),fl=new Set(JSON.parse(localStorage.getItem('piv')||'[]')),mk={};
let gpsOn=false,gpsWatch=null,posMk=null,proxCircle=null,myLat=null,myLng=null,lastAlerted=new Set();
let alertInv=null,routeLayer=null,radarOpen=false,randoOpen=false;

// ── INIT MAP ──────────────────────────────────────────────────────────
const map=L.map('map',{center:[48.8566,2.3522],zoom:14});
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'©OSM',maxZoom:19}).addTo(map);
const cg=L.markerClusterGroup({
  maxClusterRadius:40,showCoverageOnHover:false,spiderfyOnMaxZoom:true,
  iconCreateFunction:c=>L.divIcon({
    html:`<div style="background:rgba(0,255,204,.08);border:1px solid rgba(0,255,204,.2);border-radius:3px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:Orbitron,monospace;font-size:9px;color:#00ffcc;font-weight:700;">${c.getChildCount()}</div>`,
    className:'',iconSize:[28,28]
  })
});
map.addLayer(cg);

// ── SPLASH + LOAD DATA ─────────────────────────────────────────────────
function prog(p,msg){
  document.getElementById('splash-bar').style.width=p+'%';
  if(msg)document.getElementById('splash-msg').textContent=msg;
}

async function loadData(){
  prog(20,'CHARGEMENT');
  try{
    const r=await fetch('./data.json');
    D=await r.json();
    prog(70,'INIT CARTE');
    initMarkers();
    prog(100,'PRÊT');
    setTimeout(()=>{
      const sp=document.getElementById('splash');
      sp.style.opacity='0';
      setTimeout(()=>sp.style.display='none',400);
    },300);
  }catch(e){
    document.getElementById('splash-msg').textContent='ERREUR CHARGEMENT';
  }
}

// ── MARKERS ─────────────────────────────────────────────────────────────
function mi(st,f){
  const c=C[st]||'#00ffcc',o=f?0.15:1;
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" opacity="${o}"><rect x="1.5" y="1.5" width="13" height="13" fill="${c}18" stroke="${c}" stroke-width="1.5"/><rect x="4" y="4" width="3" height="3" fill="${c}"/><rect x="9" y="4" width="3" height="3" fill="${c}"/><rect x="5" y="9" width="6" height="2" fill="${c}"/><rect x="3" y="7" width="1.5" height="2" fill="${c}66"/><rect x="11.5" y="7" width="1.5" height="2" fill="${c}66"/></svg>`,
    className:'',iconSize:[16,16],iconAnchor:[8,8],popupAnchor:[0,-10]
  });
}

function initMarkers(){
  const s=D.reduce((a,i)=>{a[i.status]=(a[i.status]||0)+1;return a},{});
  document.getElementById('co').textContent=s.OK||0;
  document.getElementById('cd').textContent=s.damaged||0;
  document.getElementById('cx').textContent=s.destroyed||0;
  document.getElementById('ch').textContent=s.hidden||0;
  D.forEach(inv=>{
    if(!inv.obf_lat||!inv.obf_lng)return;
    const m=L.marker([inv.obf_lat,inv.obf_lng],{icon:mi(inv.status,fl.has(inv.id)),invStatus:inv.status,invId:inv.id});
    m.bindPopup(()=>pop(inv),{minWidth:170});
    mk[inv.id]=m;
  });
  rn();
  document.getElementById('fn').textContent=fl.size;
}

function pop(inv){
  const f=fl.has(inv.id);
  const arr=getArr(inv.id);
  const navUrl=`https://maps.apple.com/?daddr=${inv.obf_lat},${inv.obf_lng}&dirflg=w`;
  const gmUrl=`https://www.google.com/maps/dir/?api=1&destination=${inv.obf_lat},${inv.obf_lng}&travelmode=walking`;
  return `<div>
    <div class="pi">${inv.id}</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <div class="ps ${inv.status}">${inv.status.toUpperCase()}</div>
      ${arr?`<div style="font-size:9px;color:#555">${arr}e arr.</div>`:''}
    </div>
    ${inv.hint?`<div class="ph">💡 ${inv.hint}</div>`:''}
    <div class="pa">
      <button class="pb pf ${f?'fl':''}" onclick="tfl('${inv.id}',this)">${f?'✓ FLASHÉ':'⚡ FLASH'}</button>
      <a href="${inv.instagramUrl}" target="_blank" class="pb">📸 INSTA</a>
    </div>
    <div class="pa">
      <a href="${navUrl}" target="_blank" class="pb pnav">🗺 APPLE</a>
      <a href="${gmUrl}" target="_blank" class="pb pnav">📍 GMAPS</a>
    </div>
  </div>`;
}

function getArr(id){
  // PA_XXX → arrondissement par numéro
  // Estimation par coordonnées selon les ranges de numéros PA_
  const inv=D.find(i=>i.id===id);
  if(!inv||!inv.obf_lat)return null;
  // Mapping lat/lng vers arrondissement Paris
  return geoArr(inv.obf_lat,inv.obf_lng);
}

function geoArr(lat,lng){
  // Approximation grossière des arrondissements de Paris par bounding boxes
  if(lat>48.875&&lng<2.35)return 18;
  if(lat>48.875&&lng>=2.35&&lng<2.37)return 19;
  if(lat>48.875&&lng>=2.37)return 20;
  if(lat>48.865&&lat<=48.875&&lng<2.34)return 17;
  if(lat>48.865&&lat<=48.875&&lng>=2.34&&lng<2.36)return 9;
  if(lat>48.865&&lat<=48.875&&lng>=2.36&&lng<2.375)return 10;
  if(lat>48.865&&lat<=48.875&&lng>=2.375)return 11;
  if(lat>48.855&&lat<=48.865&&lng<2.325)return 8;
  if(lat>48.855&&lat<=48.865&&lng>=2.325&&lng<2.345)return 2;
  if(lat>48.855&&lat<=48.865&&lng>=2.345&&lng<2.36)return 3;
  if(lat>48.855&&lat<=48.865&&lng>=2.36&&lng<2.375)return 11;
  if(lat>48.855&&lat<=48.865&&lng>=2.375)return 20;
  if(lat>48.845&&lat<=48.855&&lng<2.32)return 7;
  if(lat>48.845&&lat<=48.855&&lng>=2.32&&lng<2.335)return 1;
  if(lat>48.845&&lat<=48.855&&lng>=2.335&&lng<2.355)return 4;
  if(lat>48.845&&lat<=48.855&&lng>=2.355&&lng<2.375)return 12;
  if(lat>48.845&&lat<=48.855&&lng>=2.375)return 12;
  if(lat>48.835&&lat<=48.845&&lng<2.33)return 15;
  if(lat>48.835&&lat<=48.845&&lng>=2.33&&lng<2.35)return 6;
  if(lat>48.835&&lat<=48.845&&lng>=2.35&&lng<2.365)return 5;
  if(lat>48.835&&lat<=48.845&&lng>=2.365)return 13;
  if(lat<=48.835&&lng<2.31)return 15;
  if(lat<=48.835&&lng>=2.31&&lng<2.35)return 14;
  if(lat<=48.835&&lng>=2.35)return 13;
  return null;
}

function rn(){
  cg.clearLayers();let n=0;
  Object.values(mk).forEach(m=>{if(af.has(m.options.invStatus)){cg.addLayer(m);n++;}});
  document.getElementById('vn').textContent=n;
}

function tf(s){
  af.has(s)?af.delete(s):af.add(s);
  document.querySelectorAll('.stat').forEach(el=>{
    const st=el.getAttribute('onclick').match(/'([^']+)'/)[1];
    el.classList.toggle('on',af.has(st));el.classList.toggle('off',!af.has(st));
  });

}

function si(v){
  v=v.toUpperCase().trim();if(!v){rn();return;}
  cg.clearLayers();let n=0;
  Object.entries(mk).forEach(([id,m])=>{
    if(id.includes(v)&&af.has(m.options.invStatus)){
      cg.addLayer(m);n++;
      if(n===1){const inv=D.find(i=>i.id===id);if(inv)map.setView([inv.obf_lat,inv.obf_lng],18);m.openPopup();}
    }
  });
  document.getElementById('vn').textContent=n;
}

function tfl(id,btn){
  if(fl.has(id)){fl.delete(id);btn.textContent='⚡ FLASH';btn.classList.remove('fl');}
  else{fl.add(id);btn.textContent='✓ FLASHÉ';btn.classList.add('fl');}
  const inv=D.find(i=>i.id===id);
  if(inv&&mk[id])mk[id].setIcon(mi(inv.status,fl.has(id)));
  localStorage.setItem('piv',JSON.stringify([...fl]));
  document.getElementById('fn').textContent=fl.size;
  if(radarOpen)updateRadarList();
}

// ── GPS ──────────────────────────────────────────────────────────────────
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function toggleGps(){gpsOn?stopGps():startGps();}

function startGps(){
  if(!navigator.geolocation){alert('Géolocalisation non supportée');return;}
  const btn=document.getElementById('gps-btn');
  btn.classList.add('active');
  document.getElementById('gps-info').style.color='var(--accent)';
  document.getElementById('gps-info').textContent='GPS…';
  navigator.geolocation.getCurrentPosition(pos=>{
    onPos(pos);
    gpsWatch=navigator.geolocation.watchPosition(onPos,onGpsErr,{enableHighAccuracy:true,timeout:30000,maximumAge:10000});
    gpsOn=true;
  },onGpsErr,{enableHighAccuracy:true,timeout:20000,maximumAge:0});
}

function stopGps(){
  if(gpsWatch)navigator.geolocation.clearWatch(gpsWatch);
  gpsOn=false;gpsWatch=null;myLat=null;myLng=null;
  if(posMk){map.removeLayer(posMk);posMk=null;}
  if(proxCircle){map.removeLayer(proxCircle);proxCircle=null;}
  document.getElementById('gps-btn').classList.remove('active');
  document.getElementById('gps-info').textContent='GPS OFF';
  document.getElementById('gps-info').style.color='#333';
  lastAlerted.clear();closeAlert();
}

function onPos(pos){
  myLat=pos.coords.latitude;myLng=pos.coords.longitude;
  const acc=Math.round(pos.coords.accuracy);
  document.getElementById('gps-info').textContent=`±${acc}m`;
  document.getElementById('gps-info').style.color=acc<30?'var(--ok)':acc<80?'var(--damaged)':'var(--destroyed)';
  if(!posMk){
    posMk=L.marker([myLat,myLng],{
      icon:L.divIcon({html:'<div class="my-dot"></div>',className:'',iconSize:[14,14],iconAnchor:[7,7]}),
      zIndexOffset:1000
    }).addTo(map);
    map.setView([myLat,myLng],17);
  }else{posMk.setLatLng([myLat,myLng]);}
  if(!proxCircle){
    proxCircle=L.circle([myLat,myLng],{radius:PROX,color:'rgba(0,255,204,.4)',weight:1,fillOpacity:.04,dashArray:'5,8'}).addTo(map);
  }else{
    proxCircle.setLatLng([myLat,myLng]);
    proxCircle.setRadius(PROX);
  }
  checkProximity();
  if(radarOpen)updateRadarList();
}

function onGpsErr(e){
  const msg={1:'REFUSÉ',2:'INDISPO',3:'TIMEOUT'};
  document.getElementById('gps-info').textContent='GPS '+( msg[e.code]||'ERR');
  document.getElementById('gps-info').style.color='var(--destroyed)';
}

function checkProximity(){
  if(myLat===null)return;
  const nearby=getNearby(PROX);
  const newOnes=nearby.filter(i=>!lastAlerted.has(i.id));
  if(newOnes.length>0){
    newOnes.forEach(i=>lastAlerted.add(i.id));
    alertInv=nearby[0];
    showAlert(nearby);
    if(navigator.vibrate)navigator.vibrate([200,80,200,80,400]);
  }
  lastAlerted.forEach(id=>{if(!nearby.find(i=>i.id===id))lastAlerted.delete(id);});
  if(nearby.length===0)closeAlert();
}

function getNearby(radius){
  if(myLat===null)return[];
  const nearby=[];
  D.forEach(inv=>{
    if(!inv.obf_lat||!inv.obf_lng||fl.has(inv.id)||!af.has(inv.status))return;
    const dist=haversine(myLat,myLng,inv.obf_lat,inv.obf_lng);
    if(dist<=radius)nearby.push({...inv,dist:Math.round(dist)});
  });
  return nearby.sort((a,b)=>a.dist-b.dist);
}

function showAlert(nearby){
  const c=nearby[0];
  const more=nearby.length>1?` +${nearby.length-1}`:''
  document.getElementById('alert-info').innerHTML=
    `<b style="color:var(--ok);font-family:Orbitron,monospace">${c.id}</b> · <b>${c.dist}m</b>${more}`;
  document.getElementById('alert').style.display='flex';
}

function closeAlert(){document.getElementById('alert').style.display='none';}

function navClosest(){
  if(!alertInv)return;
  const url=`https://maps.apple.com/?daddr=${alertInv.obf_lat},${alertInv.obf_lng}&dirflg=w`;
  window.open(url,'_blank');
}

// ── RADAR PANEL ──────────────────────────────────────────────────────────
function toggleRadar(){
  radarOpen=!radarOpen;
  document.getElementById('radar').style.display=radarOpen?'flex':'none';
  document.getElementById('radar-btn').classList.toggle('active',radarOpen);
  if(radarOpen)updateRadarList();
}

function updateRadius(v){
  PROX=parseInt(v);
  document.getElementById('radius-val').textContent=v;
  if(proxCircle)proxCircle.setRadius(PROX);
  if(radarOpen)updateRadarList();
  checkProximity();
}

function updateRadarList(){
  const list=document.getElementById('radar-list');
  if(myLat===null){
    list.innerHTML='<div style="font-size:10px;color:#555;padding:8px">Active le GPS pour voir les invaders proches</div>';
    return;
  }
  // Top 10 nearest (non flashés dans le rayon, ou tous les non-flashés si GPS actif)
  const all=D.filter(inv=>inv.obf_lat&&inv.obf_lng&&!fl.has(inv.id)&&af.has(inv.status))
    .map(inv=>({...inv,dist:Math.round(haversine(myLat,myLng,inv.obf_lat,inv.obf_lng))}))
    .sort((a,b)=>a.dist-b.dist)
    .slice(0,10);
  
  if(all.length===0){list.innerHTML='<div style="font-size:10px;color:#555;padding:8px">Aucun invader à flasher</div>';return;}
  
  list.innerHTML=all.map(inv=>{
    const c=C[inv.status]||'#00ffcc';
    const inR=inv.dist<=PROX;
    return `<div class="radar-item${fl.has(inv.id)?' fl':''}" onclick="focusInv('${inv.id}')">
      <div class="ri-id">${inv.id}</div>
      <div class="ri-dist" style="color:${inR?'var(--ok)':'#777'}">${inv.dist}m</div>
      <div class="ri-status" style="background:${c}18;color:${c};border:1px solid ${c}">${inv.status.toUpperCase()}</div>
      <div class="ri-hint">${inv.hint||''}</div>
      <button class="ri-nav" onclick="event.stopPropagation();navTo(${inv.obf_lat},${inv.obf_lng})">🗺</button>
    </div>`;
  }).join('');
}

function focusInv(id){
  const inv=D.find(i=>i.id===id);
  if(!inv)return;
  map.setView([inv.obf_lat,inv.obf_lng],18);
  if(mk[id])mk[id].openPopup();
}

function navTo(lat,lng){
  const url=`https://maps.apple.com/?daddr=${lat},${lng}&dirflg=w`;
  window.open(url,'_blank');
}

// ── RANDO (TSP nearest neighbor) ──────────────────────────────────────────
function toggleRando(){
  randoOpen=!randoOpen;
  document.getElementById('rando-panel').style.display=randoOpen?'block':'none';
  document.getElementById('rando-btn').classList.toggle('active',randoOpen);
}

function calcRando(){
  if(myLat===null){alert('Active le GPS d\'abord');return;}
  const n=parseInt(document.getElementById('rando-n').value);
  const r=parseInt(document.getElementById('rando-r').value);
  
  // Filtrer les candidats
  const candidates=D.filter(inv=>inv.obf_lat&&inv.obf_lng&&!fl.has(inv.id)&&af.has(inv.status))
    .map(inv=>({...inv,dist:Math.round(haversine(myLat,myLng,inv.obf_lat,inv.obf_lng))}))
    .filter(inv=>inv.dist<=r)
    .sort((a,b)=>a.dist-b.dist)
    .slice(0,Math.min(n*3,60)); // pool élargi pour TSP
  
  if(candidates.length===0){
    document.getElementById('rando-route').innerHTML='<div style="font-size:10px;color:var(--destroyed);padding:8px">Aucun invader dans ce rayon</div>';
    document.getElementById('rando-route').style.display='block';
    return;
  }
  
  // TSP nearest neighbor depuis position actuelle
  const route=tspNN(myLat,myLng,candidates,n);
  displayRoute(route);
}

function tspNN(startLat,startLng,candidates,maxN){
  const visited=new Set();
  const route=[];
  let curLat=startLat,curLng=startLng;
  
  while(route.length<maxN&&visited.size<candidates.length){
    let best=null,bestDist=Infinity;
    candidates.forEach(inv=>{
      if(visited.has(inv.id))return;
      const d=haversine(curLat,curLng,inv.obf_lat,inv.obf_lng);
      if(d<bestDist){bestDist=d;best=inv;}
    });
    if(!best)break;
    visited.add(best.id);
    route.push({...best,leg:Math.round(bestDist)});
    curLat=best.obf_lat;curLng=best.obf_lng;
  }
  return route;
}

function displayRoute(route){
  // Supprimer ancienne route
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}
  
  if(route.length===0)return;
  
  // Tracer la route sur la carte
  const pts=[[myLat,myLng],...route.map(inv=>[inv.obf_lat,inv.obf_lng])];
  routeLayer=L.polyline(pts,{color:'rgba(0,255,204,.5)',weight:2,dashArray:'6,4'}).addTo(map);
  map.fitBounds(routeLayer.getBounds(),{padding:[30,30]});
  
  // Total distance
  const total=route.reduce((s,inv)=>s+inv.leg,0);
  
  // Afficher la liste
  const div=document.getElementById('rando-route');
  div.style.display='block';
  div.innerHTML=`
    <div style="font-size:10px;color:#555;padding:4px 0;margin-bottom:4px;border-bottom:1px solid #1a1a2e">
      ${route.length} stops · ~${total}m à pied · ~${Math.round(total/80)}min
    </div>
    ${route.map((inv,i)=>`
      <div class="rando-stop">
        <div class="rando-stop-num">${i+1}</div>
        <div class="rando-stop-id">${inv.id}</div>
        <div class="rando-stop-d">+${inv.leg}m</div>
        <button class="rando-stop-nav" onclick="navTo(${inv.obf_lat},${inv.obf_lng})">🗺</button>
        <button class="rando-stop-nav" onclick="focusInv('${inv.id}')">📍</button>
      </div>`).join('')}
    <button onclick="clearRoute()" style="width:100%;margin-top:6px;background:transparent;border:1px solid #252535;color:#555;font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px;cursor:pointer;border-radius:2px;">✕ EFFACER ROUTE</button>
  `;
}

function clearRoute(){
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}
  document.getElementById('rando-route').style.display='none';
}

// ── STATS ────────────────────────────────────────────────────────────────
function showStats(){
  const panel=document.getElementById('stats-panel');
  panel.style.display='flex';
  renderStats();
}

function hideStats(){
  document.getElementById('stats-panel').style.display='none';
}

function renderStats(){
  const total=D.length;
  const flashedCount=fl.size;
  const pct=Math.round(flashedCount/total*100);
  
  // Stats globales
  const sg=document.getElementById('stats-global');
  sg.innerHTML=`
    <div class="sg-card">
      <div class="sg-val">${flashedCount}</div>
      <div class="sg-lbl">FLASHÉS</div>
      <div class="sg-bar"><div class="sg-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sg-card">
      <div class="sg-val">${pct}%</div>
      <div class="sg-lbl">PROGRESSION</div>
      <div class="sg-bar"><div class="sg-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sg-card">
      <div class="sg-val">${total-flashedCount}</div>
      <div class="sg-lbl">RESTANTS</div>
    </div>
    <div class="sg-card">
      <div class="sg-val">${total}</div>
      <div class="sg-lbl">TOTAL</div>
    </div>
  `;
  
  // Stats par arrondissement
  const byArr={};
  D.forEach(inv=>{
    if(!inv.obf_lat)return;
    const arr=geoArr(inv.obf_lat,inv.obf_lng)||0;
    if(!byArr[arr])byArr[arr]={total:0,flashed:0,OK:0,damaged:0,destroyed:0,hidden:0};
    byArr[arr].total++;
    byArr[arr][inv.status]=(byArr[arr][inv.status]||0)+1;
    if(fl.has(inv.id))byArr[arr].flashed++;
  });
  
  const sorted=Object.entries(byArr).sort((a,b)=>{
    const pa=a[1].flashed/a[1].total;const pb=b[1].flashed/b[1].total;
    return pb-pa;
  });
  
  const grid=document.getElementById('arr-grid');
  grid.innerHTML=sorted.map(([arr,s])=>{
    const p=Math.round(s.flashed/s.total*100);
    return `<div class="arr-card" onclick="focusArr(${arr})">
      <div class="arr-num">${arr?arr+'<sup>e</sup> ARR.':' ?'}</div>
      <div class="arr-prog">${s.flashed}/${s.total} · ${p}%</div>
      <div class="arr-bar"><div class="arr-bar-fill" style="width:${p}%"></div></div>
      <div class="arr-counts">
        <span style="color:#00ff88">${s.OK||0}✓</span>
        <span style="color:#ffaa00">${s.damaged||0}!</span>
        <span style="color:#ff3355">${s.destroyed||0}✗</span>
        <span style="color:#8888ff">${s.hidden||0}?</span>
      </div>
    </div>`;
  }).join('');
}

function focusArr(arr){
  hideStats();
  if(!arr)return;
  // Zoomer sur les invaders de cet arrondissement
  const invs=D.filter(inv=>inv.obf_lat&&geoArr(inv.obf_lat,inv.obf_lng)===arr);
  if(invs.length===0)return;
  const lats=invs.map(i=>i.obf_lat),lngs=invs.map(i=>i.obf_lng);
  map.fitBounds([[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]],{padding:[20,20]});
}

function ef(){

    const r=new FileReader();

      }catch(e){alert('Fichier invalide');}

}
function cf(){
  if(!confirm('Reset tous les invaders flashés ?'))return;
  fl.clear();localStorage.setItem('piv','[]');
  D.forEach(inv=>{if(mk[inv.id])mk[inv.id].setIcon(mi(inv.status,false));});

}
